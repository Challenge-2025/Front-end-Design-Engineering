<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../style/login-style.css" />
    <link rel="icon" href="../img/favicon-updated.ico" type="image/reabilita-icon">
    <title>Reabilita Mais</title>
  </head>
  <body>
    <header class="cabeca">
      <article>
        <div class="countainer-img">
          <a href="../index.html">
            <img src="../img/logo-branca-reabilita-sem-fundo.png" alt="Logo Reabilita+" width="90px" height="90px">
          </a>
        </div> 
      </article>
    </header>

    <main>
      <article class="login">
        <div class="countainer-login">
          <h2 class="conta-txt">Acesse sua conta</h2>

          <div class="campo-login">
            <p>Digite seu CPF</p>
            <input class="input-cpf" type="text" placeholder="Digite seu CPF" />
          </div>

          <div class="campo-login">
            <p>Digite sua Senha</p>
            <input class="input-senha" type="password" placeholder="Digite sua senha" />
          </div>

          <div class="botao-entrar">
            <button class="btn-entrar">Entrar</button>
          </div>
        </div>
</article>

    </main>

    <article class="ajuda">
      <a href="#" class="btn-ajuda">
        <img src="../img/ponto-de-interrogação-64.png" alt="botão de ajuda" width="30px" height="30px">
      </a>
    </article>
  </body>
</html>
