<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../style/faleconosco-style.css" />
  <link rel="icon" href="../img/favicon-updated.ico" type="image/reabilita-icon">
  <title>Fale Conosco - Reabilita Mais</title>
  <script src="../script/faleconosco.js" defer></script>
</head>
<body>
  <header id="cabeca" class="cabeca">
    <a href="../index.html">
      <img src="../img/logo-branca-reabilita-sem-fundo.png" alt="Logo Reabilita+" class="logo">
    </a>
  </header>

  <main class="fale-conosco">
    <section class="form-container">
      <h1>Fale Conosco</h1>
      <p>Preencha o formulário abaixo e nossa equipe entrará em contato com você o mais breve possível.</p>

      <form class="form-fale-conosco">
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required>

        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>

        <label for="telefone">Telefone</label>
        <input type="tel" id="telefone" name="telefone" placeholder="(DDD) 90000-0000">

        <label for="mensagem">Mensagem</label>
        <textarea id="mensagem" name="mensagem" placeholder="Digite sua mensagem aqui..." rows="5" required></textarea>

        <button type="submit" class="btn-enviar">Enviar</button>
      </form>
    </section>
  </main>

  <footer class="rodape">
    <section class="countainer-social">
      <ul class="social-links">
        <li><a href="https://www.instagram.com/"><img src="../img/insta-icon.png" alt=""></a></li>
        <li><a href="https://www.facebook.com/?locale=pt_BR"><img src="../img/face-icon.png" alt=""></a></li>
        <li><a href="https://www.linkedin.com/"><img src="../img/linkedin-icon.png" alt=""></a></li>
      </ul>
    </section>

    <p>Contatos:</p>
    <section class="countainer-contatos">
      <p>Email: reabilitamais@hotmail.com</p>
      <p>Tel:(11) 97142-1287</p>
    </section>

    <p>IMAGENS E DIREITOS RESERVADOS PELA EQUIPE DO REABILITA+</p>
  </footer>
</body>
</html>
