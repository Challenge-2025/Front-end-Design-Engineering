<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" >
    <link rel="stylesheet" href="../style/cadastro-style.css">
    <link rel="icon" href="../img/favicon-updated.ico" type="image/reabilita-icon">
    
    <title>Cadastro - Reabilita Mais</title>
  </head>

  <body>
    <header class="cabeca">
      <article>
        <div class="container-img">
          <a href="../index.html">
            <img class="img-reabilita" src="../img/logo-branca-reabilita-sem-fundo.png" alt="Logo Reabilita+">
          </a>
        </div> 
      </article>
    </header>

    <main>
      <article class="cadastro">
        <div class="container-cadastro">
          <h2 id="titulo">Cadastro</h2>
          <h3 id="sub-titulo">Digite abaixo suas informações</h3>

          <div class="campos">
            <input type="text" class="inputs" placeholder="Nome completo">
            <input type="text" class="inputs" placeholder="CEP">
            <input type="text" class="inputs" placeholder="CPF">
            <input type="text" class="inputs" placeholder="Número de celular">
            <input type="text" class="inputs" placeholder="Logradouro">
            <input type="text" class="inputs" placeholder="Complemento">
          </div>

          <button id="btn-cadastrar">Cadastrar</button>
        </div>


      </article>

    </main>

    <article class="ajuda">
      <a href="../index.html" class="btn-ajuda">
        <img class="icon-ajuda" src="../img/ponto-de-interrogação-64.png" alt="botão de ajuda">
      </a>
    </article>
    <script src="../script/cadastro.js" defer></script>
  </body>
</html>
